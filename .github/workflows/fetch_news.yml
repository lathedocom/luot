name: AI Newsroom Bot

on:
  workflow_dispatch: # Chỉ giữ lại cổng nhận lệnh thủ công và API

jobs:
  fetch-and-process-news:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd script_bot
          npm install
          npm install groq-sdk

      - name: Run AI Newsroom Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RAPID_API_KEY: ${{ secrets.RAPID_API_KEY }}
        run: |
          cd script_bot
          node fetch_news.js

      - name: Commit and Push Updated News Data
        run: |
          git config --global user.name "AI-Newsroom-Bot"
          git config --global user.email "bot@ainewsroom.local"
          
          # Chỉ đích danh file cần đưa vào giỏ hàng
          git add news_data.json
          
          # Chỉ kiểm tra giỏ hàng (staged). Nếu có thay đổi mới commit, nếu không thì bỏ qua nhẹ nhàng.
          git diff --staged --quiet || git commit -m "Cập nhật tin tức & phân tích AI tự động"
          
          # Kéo code mới về (nếu có) để tránh đụng độ
          git pull --rebase origin main
          
          # Đẩy lên GitHub
          git push origin main
