name: AI Newsroom Bot

on:
  workflow_dispatch: # Cổng nhận lệnh từ Cron-job.org và bấm thủ công

jobs:
  fetch-and-process-news:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install Dependencies
        run: |
          cd script_bot
          npm install

      - name: Run AI Newsroom Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }} 
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RAPID_API_KEY: ${{ secrets.RAPID_API_KEY }}
        run: |
          cd script_bot
          node fetch_news.js

      - name: Commit and Push Updated Data
        run: |
          git config --global user.name "AI-Newsroom-Bot"
          git config --global user.email "bot@ainewsroom.local"
          
          # Bật tính năng tự động giấu file rác khi đồng bộ
          git config --global rebase.autoStash true

          git add news_data.json pipeline_status.json script_bot/cache/ script_bot/budget/ || true
          
          # [QUAN TRỌNG] Lưu data chính, trạng thái hệ thống và toàn bộ thư mục cache (data/)
          git add news_data.json pipeline_status.json data/ || true
          
          git diff --staged --quiet || git commit -m "🤖 Cập nhật tin tức, Cache & trạng thái V4"
          git pull --rebase origin main
          git push origin main
