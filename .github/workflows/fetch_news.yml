name: AI Newsroom Bot

on:
  schedule:
    # Chạy vào lúc 7:17, 11:17, 16:17, 20:17 (Giờ VN)
    - cron: '17 0,4,9,13 * * *'
  workflow_dispatch:

jobs:
  fetch-and-process-news:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd script_bot
          npm install

      - name: Run AI Newsroom Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RAPID_API_KEY: ${{ secrets.RAPID_API_KEY }}
        run: |
          cd script_bot
          node fetch_news.js

      - name: Commit and Push Updated News Data
        run: |
          git config --global user.name "AI-Newsroom-Bot"
          git config --global user.email "bot@ainewsroom.local"
          git add news_data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Cập nhật tin tức & phân tích AI tự động"
          git push origin main
