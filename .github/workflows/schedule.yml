name: Tòa Soạn AI Tự Động

on:
  # Lệnh 1: Hẹn giờ chạy tự động (Đồng hồ báo thức)
  schedule:
    - cron: '0 */6 * * *' # Chạy mỗi 6 tiếng (Giờ quốc tế UTC)
    
  # Lệnh 2: Vẫn giữ lại nút bấm thủ công cho bạn khi cần test
  workflow_dispatch:

jobs:
  fetch-and-process-news:
    runs-on: ubuntu-latest
    
    # Cấp quyền cho Bot được phép ghi file và đăng lên GitHub
    permissions:
      contents: write

    steps:
      - name: Lấy mã nguồn về máy chủ
        uses: actions/checkout@v3

      - name: Cài đặt môi trường Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Cài đặt thư viện và Khởi động Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd script_bot
          npm install
          node fetch_news.js

      - name: Lưu file news_data.json và Đẩy lên Web
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add news_data.json
          # Nếu có tin mới thì lưu, nếu không có gì thay đổi thì bỏ qua không báo lỗi
          git commit -m "🤖 Tòa soạn AI cập nhật tin tức mới" || exit 0
          git push
