<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LƯỚT - Bản tin AI Tình báo</title>
    
    <!-- Bộ Font Roboto và Icon chuẩn Material Design -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    
    <!-- Liên kết tới file thiết kế CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- Thanh điều hướng trên cùng (App Bar) -->
    <header class="app-bar">
        <div class="container header-content">
            <h1 class="logo">LƯỚT <span>AI Newsroom</span></h1>
            <div class="actions">
                <button id="theme-toggle" class="icon-btn" title="Chuyển chế độ Sáng/Tối">
                    <span class="material-icons-round">dark_mode</span>
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Khu vực Thị trường & Xu hướng MXH (Sẽ chèn bằng JS) -->
        <section class="top-dashboard" id="market-container"></section>

        <!-- Lưới chia đôi màn hình: Tin tức (Trái) & Báo cáo AI (Phải) -->
        <div class="news-grid">
            <div class="main-content" id="news-container">
                <!-- Trạng thái chờ tải dữ liệu -->
                <div class="loading-state">
                    <span class="material-icons-round spin">sync</span>
                    <p>Hệ thống AI đang nạp dữ liệu phân tích...</p>
                </div>
            </div>
            
            <aside class="sidebar" id="briefing-container">
                <!-- Bản tin Daily Briefing sẽ nằm ở đây -->
            </aside>
        </div>
    </main>

    <!-- Liên kết tới file logic xử lý dữ liệu -->
    <script src="assets/js/app.js"></script>
</body>
</html>
