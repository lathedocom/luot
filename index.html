<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Newsroom - Tòa Soạn Tự Động</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Roboto chuẩn Material Design -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <!-- Thanh điều hướng trên cùng -->
    <header class="app-bar">
        <div class="header-left">
            <button id="menu-btn" class="icon-btn mobile-only"><span class="material-icons">menu</span></button>
            <h1 class="logo">AI Newsroom</h1>
        </div>
        
        <!-- Thanh tìm kiếm -->
        <div class="search-box">
            <span class="material-icons">search</span>
            <input type="text" id="search-input" placeholder="Tìm kiếm sự kiện, tin tức...">
        </div>
    </header>

    <!-- Bố cục chính -->
    <main class="main-layout">
        <!-- Sidebar Trái (Sẽ bị giấu đi và mở bằng nút Menu trên Mobile) -->
        <aside class="sidebar left-sidebar" id="left-sidebar">
            <div class="widget card">
                <h3><span class="material-icons">thermostat</span> Thời Tiết</h3>
                <p>28°C - Nhiều mây (Hà Nội)</p>
            </div>
            <div class="widget card">
                <h3><span class="material-icons">calendar_month</span> 7 Ngày Qua</h3>
                <ul class="clean-list" id="dynamic-days-list">
                    <!-- JS sẽ sinh ngày ở đây -->
                </ul>
            </div>
            <div class="widget card">
                <h3><span class="material-icons">filter_alt</span> Bộ Lọc Nguồn</h3>
                <label><input type="checkbox" checked> VNExpress</label><br>
                <label><input type="checkbox" checked> Tuổi Trẻ</label><br>
                <label><input type="checkbox" checked> Dân Trí</label><br>
                <label><input type="checkbox" checked> Thanh Niên</label>
            </div>
        </aside>

        <!-- Feed Tin Tức -->
        <section class="news-feed" id="news-feed">
            <div class="loading">Đang tải tin tức...</div>
        </section>

        <!-- Sidebar Phải -->
        <aside class="sidebar right-sidebar">
            <h2 class="section-title">Nhịp Đập MXH</h2>
            <div id="social-feed"></div>
        </aside>
    </main>

    <!-- Modal Chi Tiết Tin Tức -->
    <div class="modal-overlay" id="news-modal">
        <div class="modal-dialog card">
            <div class="modal-header">
                <h2 id="modal-title">Tiêu đề cụm sự kiện</h2>
                <div id="modal-time" class="news-time"></div>
                <button id="close-modal-btn" class="icon-btn"><span class="material-icons">close</span></button>
            </div>
            <div class="modal-body">
                <p id="modal-content" class="detailed-text"></p>
                <div id="ai-analysis-container" class="ai-box hidden">
                    <h3 class="ai-title"><span class="material-icons">smart_toy</span> Góc Nhìn Chuyên Gia AI</h3>
                    <p id="ai-analysis-text"></p>
                </div>
                <div class="sources-container">
                    <h3>Nguồn đưa tin:</h3>
                    <div id="modal-sources" class="source-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
